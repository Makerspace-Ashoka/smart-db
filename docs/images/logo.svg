<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" fill="none">
  <title>Smart DB</title>
  <desc>
    A minimal inventory-module mark: two tracked-unit cells above one pooled-stock cell,
    paired with a restrained wordmark.
  </desc>

  <g transform="translate(18 14)">
    <rect x="0" y="0" width="88" height="88" rx="18" fill="#fff" stroke="#2563eb" stroke-width="6"/>

    <line x1="24" y1="40" x2="64" y2="40" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
    <line x1="44" y1="22" x2="44" y2="44" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
    <line x1="18" y1="58" x2="70" y2="58" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>

    <rect x="18" y="62" width="38" height="14" rx="7" fill="#dbeafe"/>
    <circle cx="26" cy="30" r="4.5" fill="#111827"/>
    <circle cx="62" cy="30" r="4.5" fill="#c48b2d"/>

    <line x1="72" y1="30" x2="97" y2="30" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
    <circle cx="103" cy="30" r="4" fill="#fff" stroke="#2563eb" stroke-width="2"/>
  </g>

  <g transform="translate(146 0)">
    <text
      x="0"
      y="69"
      font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace"
      font-size="48"
      font-weight="600"
      letter-spacing="-1.5"
      fill="#111827"
    >
      smart
    </text>
    <text
      x="178"
      y="69"
      font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace"
      font-size="48"
      font-weight="600"
      letter-spacing="-1.5"
      fill="#2563eb"
    >
      db
    </text>
    <text
      x="2"
      y="95"
      font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace"
      font-size="11"
      font-weight="500"
      letter-spacing="2.8"
      fill="#6b7280"
    >
      INVENTORY FOR MAKERSPACES
    </text>
  </g>
</svg>
